<!DOCTYPE HTML>
<HTML lang="vi">
    <head>
        <title>Sign in</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="../css/style2.css">
    </head>
    <body>
        <div id="from">
            <form id="frSign_in">
                <h3 id="title">Đăng nhập</h3>
                <div class="SignIn">
                    <div class="User">
                        <label for="txtUser">Tên đăng nhập:</label>
                        <input type="text" id="txtUser" name="txtUser">
                    </div>

                    <div class="pass">
                        <label for="passUser">Mật khẩu:</label>
                        <input type="password" id="passUser" name="passUser">
                    </div>

                    <div class="submit">
                        <input class="button" type="submit" id="sbsignIn" value="Đăng nhập">
                        <input class="button" type="submit" id="sbreset" value="Nhập lại">
                    </div>
                    <div id="fogetpass">
                        <a href ="#">ForgotPassword?</a>
                    </div>
                </div>
            </form>
        </div>
    </body>
</HTML>
